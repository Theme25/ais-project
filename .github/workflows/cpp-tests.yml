name: C++ Tests

on:
  push:
  pull_request:

jobs:
  cpp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build/cpp -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build/cpp --config Release
      - name: Test
        run: ctest --test-dir build/cpp --output-on-failure
